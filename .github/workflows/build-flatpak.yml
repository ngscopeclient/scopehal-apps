name: Build-flatpak

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  Flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
    - name: Check Out Code
      uses: actions/checkout@v6
      with:
        submodules: false
        fetch-depth: 0

    - name: Check Out Submodules
      run: |
        git -C "$GITHUB_WORKSPACE" config submodule.lib.url https://github.com/ngscopeclient/scopehal.git
        git -C "$GITHUB_WORKSPACE" config submodule.doc.url https://github.com/ngscopeclient/scopehal-docs.git
        git -C "$GITHUB_WORKSPACE" submodule sync --recursive
        git -C "$GITHUB_WORKSPACE" submodule update --init --recursive

    - name: Build Flatpak bundle
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      env:
        FLATPAK_BUILDER_N_JOBS: "2"
      with:
        bundle: ngscopeclient.flatpak
        manifest-path: packaging/flatpak/org.ngscopeclient.ngscopeclient.yml
        cache-key: flatpak-builder-${{ github.sha }}
